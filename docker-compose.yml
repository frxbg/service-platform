services:
  https-proxy:
    image: caddy:2.8
    container_name: service-platform-https
    restart: unless-stopped
    ports:
      - "443:443"
      - "3443:3443"
      - "8443:8443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - mobile-app
      - backend

  db:
    image: postgres:15-alpine
    container_name: service-platform-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pyoffers
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pyoffers"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: service-platform-backend
    restart: unless-stopped
    command: >
      /bin/sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pyoffers
      JWT_SECRET: change_this_service_platform_secret
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRES_MINUTES: 10080
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173}
      CORS_ALLOWED_ORIGIN_REGEX: ${CORS_ALLOWED_ORIGIN_REGEX:-^https?://(localhost|127\\.0\\.0\\.1|192\\.168\\.\\d{1,3}\\.\\d{1,3}|10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|172\\.(1[6-9]|2\\d|3[0-1])\\.\\d{1,3}\\.\\d{1,3})(:\\d+)?$}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: service-platform-frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mobile-app:
    build:
      context: ./mobile-app
    container_name: service-platform-mobile-app
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 3001
    volumes:
      - ./mobile-app:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
